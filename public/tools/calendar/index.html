<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#1B4D4A" />
<title>Calendar · Luana Group App</title>
<meta property="og:title" content="Luana Calendar" />
<meta property="og:description" content="Shared schedule for the Luana English School team." />
<meta property="og:type" content="website" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="/shared.css" />
<link rel="stylesheet" href="./calendar.css" />
</head>
<body>
<div id="app">
  <header class="topbar">
    <div class="topbar-inner">
      <a class="brand" href="/tools/calendar/" title="Calendar">
        <span class="brand-mark">📅</span>
        <span class="brand-name">Calendar</span>
      </a>
      <button id="signOut" class="icon-btn" aria-label="Sign out" title="Sign out">⎋</button>
    </div>
    <a class="back-link" href="/">🌺 Luana Group</a>
  </header>

  <!-- Which calendar -->
  <div id="calToggle" class="seg seg-cal">
    <button class="seg-btn" data-cal="general">🏫 General</button>
    <button class="seg-btn" data-cal="students">👧 Students</button>
    <button class="seg-btn" data-cal="staff">🧑‍🏫 Staff</button>
  </div>

  <!-- Month nav -->
  <div id="calBar" class="cal-bar">
    <button id="prevBtn" class="nav-btn" aria-label="Previous">‹</button>
    <h2 id="periodLabel" class="month-label"></h2>
    <button id="nextBtn" class="nav-btn" aria-label="Next">›</button>
    <button id="todayBtn" class="today-btn">Today</button>
  </div>

  <!-- View + add -->
  <div id="viewBar" class="view-bar">
    <div id="viewToggle" class="seg seg-view">
      <button class="seg-btn" data-view="month">Month</button>
      <button class="seg-btn" data-view="week">Week</button>
      <button class="seg-btn" data-view="agenda">Agenda</button>
    </div>
    <button id="addBtn" class="btn-primary btn-sm">＋ Event</button>
  </div>

  <div id="weekdays" class="weekdays"></div>
  <div id="view" class="cal-grid"></div>

  <!-- Selected-day panel (month view only) -->
  <section id="dayPanel" class="day-panel">
    <h3 id="dayLabel" class="day-label">—</h3>
    <div id="dayEvents" class="day-events"></div>
    <p id="dayEmpty" class="day-empty" hidden>No events this day.</p>
  </section>

  <!-- Attendance (Students calendar) -->
  <section id="attendance" class="attendance" hidden>
    <div class="att-datebar">
      <button id="attPrev" class="nav-btn" aria-label="Previous day">‹</button>
      <input id="attDate" type="date" class="form-input att-date" />
      <button id="attNext" class="nav-btn" aria-label="Next day">›</button>
    </div>
    <div id="attClasses" class="seg seg-class"></div>
    <div class="att-head">
      <span id="attSummary" class="att-summary"></span>
      <button id="manageStudentsBtn" class="link-btn">Manage students</button>
    </div>
    <div id="roster" class="roster"></div>
    <p id="rosterEmpty" class="day-empty" hidden>No students in this class yet — tap “Manage students” to add some.</p>
  </section>

  <!-- Roster management (students or staff) -->
  <div id="rosterModal" class="modal" hidden>
    <div class="modal-card">
      <p id="rosterModalTitle" class="form-heading">Manage</p>
      <div id="rosterModalList" class="roster-manage"></div>
      <div class="roster-add">
        <input id="rosterAddName" type="text" placeholder="Add a name…" maxlength="80" />
        <button id="rosterAddBtn" class="btn-primary btn-sm">Add</button>
      </div>
      <div class="modal-actions"><span class="spacer"></span><button id="rosterModalClose" class="btn-ghost">Done</button></div>
    </div>
  </div>

  <!-- Add / edit form (overlay) -->
  <div id="modal" class="modal" hidden>
    <div class="modal-card">
      <p id="formTitle" class="form-heading">New event</p>

      <div id="fStaffWrap" hidden>
        <label class="field-label">Staff member</label>
        <select id="fStaff" class="form-select"></select>
        <button id="manageStaffBtn" type="button" class="link-btn">Manage staff list</button>
      </div>

      <label class="field-label" id="titleLabel">Title</label>
      <input id="fTitle" type="text" placeholder="Event title" maxlength="200" />

      <div id="fProgramWrap">
        <label class="field-label">Program</label>
        <select id="fProgram" class="form-select"></select>
      </div>

      <div id="fLessonWrap">
        <label class="field-label">Linked lesson theme (optional)</label>
        <select id="fLesson" class="form-select"></select>
      </div>

      <label class="field-label">Date</label>
      <input id="fDate" type="date" class="form-input" />
      <label class="checkline"><input id="fAllDay" type="checkbox" /> All day</label>
      <div id="timeRow" class="form-row">
        <div class="time-field"><label class="field-label">Start</label><input id="fStart" type="time" class="form-input" /></div>
        <div class="time-field"><label class="field-label">End</label><input id="fEnd" type="time" class="form-input" /></div>
      </div>

      <label class="field-label">Repeat</label>
      <select id="fRecur" class="form-select">
        <option value="none">Does not repeat</option>
        <option value="daily">Every day</option>
        <option value="weekly">Every week</option>
        <option value="monthly">Every month</option>
      </select>
      <div id="untilRow" hidden>
        <label class="field-label">Repeat until (optional)</label>
        <input id="fUntil" type="date" class="form-input" />
      </div>

      <textarea id="fNotes" rows="2" placeholder="Notes (optional)"></textarea>
      <p id="formMsg" class="form-msg"></p>
      <div class="modal-actions">
        <button id="deleteBtn" class="btn-danger" hidden>Delete</button>
        <span class="spacer"></span>
        <button id="cancelBtn" class="btn-ghost">Cancel</button>
        <button id="saveBtn" class="btn-primary btn-sm">Save</button>
      </div>
    </div>
  </div>

  <div id="loading" class="loading">Loading…</div>
</div>

<script src="/shared-auth.js"></script>
<script src="./calendar.js"></script>
</body>
</html>
