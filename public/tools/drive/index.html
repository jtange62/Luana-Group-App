<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#1B4D4A" />
<link rel="manifest" href="/manifest.json" />
<link rel="apple-touch-icon" href="/icons/icon-192.png" />
<title>Drive upload · Luana Group App</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="/shared.css" />
<link rel="stylesheet" href="./drive.css" />
</head>
<body>
<div id="app">
  <header class="topbar">
    <div class="topbar-inner">
      <a class="back-btn" href="/" aria-label="Back" onclick="event.preventDefault();history.length>1?history.back():location.href='/'">‹</a>
      <a class="brand" href="/" title="Home">
        <img src="/icons/favicon-32.png" alt="" class="brand-mark" />
        <span class="brand-name">Luana Group App</span>
      </a>
      <button id="signOut" class="icon-btn" aria-label="Sign out" title="Sign out">⎋</button>
    </div>
    <p class="brand-tag">📤 Drive upload</p>
  </header>

  <div class="drive-wrap">
    <p class="drive-hint">Upload large files — videos, recordings — directly to the shared Google Drive folder. No size limit.</p>

    <div id="dropZone" class="drop-zone" role="button" tabindex="0" aria-label="Choose file to upload">
      <span class="drop-icon">📁</span>
      <span id="dropLabel" class="drop-label">Tap to choose a file, or drag one here</span>
      <span id="fileInfo" class="file-info" hidden></span>
      <input id="filePick" type="file" hidden aria-label="File picker" />
    </div>

    <button id="uploadBtn" class="btn-primary" disabled>Upload to Drive</button>

    <div id="progressWrap" class="progress-wrap" hidden>
      <div class="progress-track"><div id="progressBar" class="progress-bar"></div></div>
      <p id="progressLabel" class="progress-label">Preparing…</p>
    </div>

    <div id="result" class="result-card" hidden>
      <span class="result-icon">✓</span>
      <div class="result-body">
        <p class="result-text">Uploaded successfully</p>
        <a id="resultLink" class="result-link" href="#" target="_blank" rel="noopener noreferrer">Open in Drive ↗</a>
      </div>
    </div>

    <div id="uploads" class="upload-history"></div>
  </div>
</div>

<script src="/shared-auth.js"></script>
<script src="./drive.js"></script>
</body>
</html>
