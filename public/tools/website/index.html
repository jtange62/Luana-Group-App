<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#DDF3E6" />
<link rel="manifest" href="/manifest.json" />
<link rel="apple-touch-icon" href="/icons/icon-192.png" />
<title>Website inbox · Luana Group App</title>
<meta property="og:title" content="Luana Website Inbox" />
<meta property="og:description" content="Drop photos, PDFs, newsletters and ideas for the school website." />
<meta property="og:type" content="website" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="/shared.css" />
<link rel="stylesheet" href="./website.css" />
</head>
<body>
<div id="app">
  <header class="topbar">
    <div class="topbar-inner">
      <a class="back-btn" href="/" aria-label="Back">‹</a>
      <a class="brand" href="/" title="Home">
        <img src="/icons/favicon-32.png" alt="" class="brand-mark" />
        <span class="brand-name">Luana Group App</span>
      </a>
      <button id="signOut" class="icon-btn" aria-label="Sign out" title="Sign out">⎋</button>
    </div>
    <p class="brand-tag">🌐 Website inbox</p>
  </header>

  <p class="intro">Drop photos, PDFs, newsletters, requests or ideas here for the website manager. Nothing is published automatically.</p>

  <div class="wi-toolbar">
    <div id="filterTabs" class="seg"></div>
    <button id="addBtn" class="btn-primary btn-sm">＋ Send item</button>
  </div>

  <section id="form" class="wi-form" hidden>
    <label class="field-label">What is it?</label>
    <select id="fType" class="form-select"></select>
    <label class="field-label" for="fTitle">Short title (optional)</label>
    <input id="fTitle" type="text" placeholder="e.g. Sports day photos" maxlength="200" />
    <label class="field-label" for="fNotes">What should the website manager know?</label>
    <textarea id="fNotes" rows="3" placeholder="Describe your request or suggestion…"></textarea>
    <div class="file-row">
      <label class="file-label">📎 Attach photos / files
        <input id="fFiles" type="file" multiple accept="image/*,application/pdf,.doc,.docx,.pages,.key,.ppt,.pptx" hidden />
      </label>
      <span id="fileList" class="file-chosen"></span>
    </div>
    <div class="form-actions">
      <span id="formMsg" class="form-msg"></span>
      <button id="cancelBtn" class="btn-ghost">Cancel</button>
      <button id="saveBtn" class="btn-primary btn-sm">Send</button>
    </div>
  </section>

  <main id="list" class="wi-list" aria-live="polite"></main>
  <div id="empty" class="empty" hidden>
    <span class="empty-icon">🌐</span>
    <p>Nothing here yet. Tap “Send item” to send the first one.</p>
  </div>
  <div id="noMatch" class="empty" hidden>
    <span class="empty-icon">✅</span>
    <p>Nothing in this list.</p>
  </div>
  <div id="loading" class="loading">Loading…</div>
  <button id="loadMore" class="load-more" hidden>Load older items</button>

  <!-- Photo lightbox -->
  <div id="lightbox" class="lightbox" hidden>
    <button id="lbClose" class="lb-close" aria-label="Close">✕</button>
    <img id="lbImg" class="lb-img" src="" alt="Photo" />
    <button id="lbPrev" class="lb-nav lb-prev" aria-label="Previous">‹</button>
    <button id="lbNext" class="lb-nav lb-next" aria-label="Next">›</button>
    <div id="lbCounter" class="lb-counter"></div>
  </div>
</div>

<script src="/shared-auth.js"></script>
<script src="/shared-utils.js"></script>
<script src="./website.js"></script>
</body>
</html>
