<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#1B4D4A" />
<link rel="manifest" href="/manifest.json" />
<link rel="apple-touch-icon" href="/icons/icon-192.png" />
<title>Student roster · Luana Group App</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="/shared.css" />
<link rel="stylesheet" href="./students.css" />
</head>
<body>
<div id="app">
  <header class="topbar">
    <div class="topbar-inner">
      <a class="back-btn" href="/" aria-label="Back" onclick="event.preventDefault();history.length>1?history.back():location.href='/'">‹</a>
      <a class="brand" href="/" title="Home">
        <span class="brand-mark">🌺</span>
        <span class="brand-name">Luana Group App</span>
      </a>
      <button id="signOut" class="icon-btn" aria-label="Sign out" title="Sign out">⎋</button>
    </div>
    <p class="brand-tag">👥 Student roster</p>
  </header>

  <nav id="programTabs" class="seg seg-program"></nav>

  <div id="studentList" class="student-list"></div>

  <div class="add-wrap">
    <button id="addToggleBtn" class="btn-primary btn-sm">+ Add student</button>
    <div id="addForm" class="add-form" hidden>
      <input id="addName" type="text" placeholder="Student name" maxlength="80" />
      <div id="addDays" class="day-chips"></div>
      <button id="addConfirmBtn" class="btn-primary btn-sm">Add</button>
      <button id="addCancelBtn" class="btn-ghost">Cancel</button>
    </div>
  </div>

  <div id="loading" class="loading">Loading…</div>
</div>
<script src="/shared-auth.js"></script>
<script src="./students.js"></script>
</body>
</html>
