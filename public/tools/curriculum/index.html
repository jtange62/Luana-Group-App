<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#DDF3E6" />
<link rel="manifest" href="/manifest.json" />
<link rel="apple-touch-icon" href="/icons/icon-192.png" />
<title>Curriculum · Luana Group App</title>
<meta property="og:title" content="Luana Curriculum" />
<meta property="og:description" content="Monthly themes, vocab, activities, phonics and songs for the Luana English School team." />
<meta property="og:type" content="website" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="/shared.css" />
<link rel="stylesheet" href="./curriculum.css" />
</head>
<body>
<div id="app">
  <header class="topbar">
    <div class="topbar-inner">
      <a class="back-btn" href="/" aria-label="Back" onclick="event.preventDefault();history.length>1?history.back():location.href='/'">‹</a>
      <a class="brand" href="/" title="Home">
        <img src="/icons/favicon-32.png" alt="" class="brand-mark" />
        <span class="brand-name">Luana Group App</span>
      </a>
      <button id="signOut" class="icon-btn" aria-label="Sign out" title="Sign out">⎋</button>
    </div>
    <p class="brand-tag">🍎 Curriculum overview</p>
  </header>

  <nav id="programTabs" class="tabs" aria-label="Programs"></nav>

  <div id="viewToggle" class="view-toggle" role="tablist" aria-label="View">
    <button class="vt-btn active" data-view="plan">🗓️ Plan</button>
    <button class="vt-btn" data-view="day">☀️ Day</button>
  </div>

  <p id="progHint" class="prog-hint"></p>

  <main id="months" class="month-list" aria-live="polite"></main>

  <!-- Day view: the program's daily rhythm assembled for one date. -->
  <section id="dayView" aria-live="polite" hidden>
    <div class="day-nav">
      <button id="dayPrev" class="day-nav-btn" aria-label="Previous day">‹</button>
      <input id="dayDate" type="date" />
      <button id="dayNext" class="day-nav-btn" aria-label="Next day">›</button>
      <button id="dayToday" class="btn-ghost btn-sm">Today</button>
      <button id="rhythmEditBtn" class="cm-edit">✎ Edit rhythm</button>
    </div>
    <p id="dayContext" class="prog-hint"></p>
    <div id="dayEvents"></div>
    <div id="dayBlocks"></div>
  </section>

  <div id="loading" class="loading">Loading…</div>

  <!-- Edit theme -->
  <div id="modal" class="modal" hidden>
    <div class="modal-card">
      <p id="formTitle" class="form-heading">Edit theme</p>
      <label class="field-label">Theme</label>
      <input id="fTitle" type="text" placeholder="e.g. Nature, Animals, Superheroes &amp; Princesses" maxlength="200" />
      <label class="field-label">Song of the month</label>
      <input id="fSong" type="text" placeholder="e.g. How Far I'll Go (from Moana)" maxlength="500" />
      <label class="field-label">Vocab</label>
      <textarea id="fVocab" rows="3" placeholder="Theme vocabulary — one per line or comma separated"></textarea>
      <label class="field-label">Activities</label>
      <textarea id="fActivities" rows="4" placeholder="Theme / weekly activities — one per line"></textarea>
      <label class="field-label">Phonics</label>
      <textarea id="fPhonics" rows="2" placeholder="Phonics focus for the month"></textarea>
      <div class="form-actions">
        <span id="formMsg" class="form-msg"></span>
        <button id="cancelBtn" class="btn-ghost">Cancel</button>
        <button id="saveBtn" class="btn-primary btn-sm">Save</button>
      </div>
    </div>
  </div>

  <!-- Edit a week within a theme -->
  <div id="weekModal" class="modal" hidden>
    <div class="modal-card">
      <p id="weekFormTitle" class="form-heading">Add week</p>
      <label class="field-label">Focus / sub-theme</label>
      <input id="wFocus" type="text" placeholder="e.g. Imagine my own Hero" maxlength="200" />
      <label class="field-label">Activities</label>
      <textarea id="wActivities" rows="3" placeholder="This week's activities — one per line"></textarea>
      <label class="field-label">Phonics</label>
      <textarea id="wPhonics" rows="2" placeholder="This week's letters / sounds"></textarea>
      <div id="wQuestionsField">
        <label class="field-label">Questions</label>
        <textarea id="wQuestions" rows="2" placeholder="Questions to focus on — one per line"></textarea>
      </div>
      <label class="field-label">Notes</label>
      <textarea id="wNotes" rows="2" placeholder="Reminders (optional)"></textarea>
      <div class="form-actions">
        <span id="weekFormMsg" class="form-msg"></span>
        <button id="weekCancelBtn" class="btn-ghost">Cancel</button>
        <button id="weekSaveBtn" class="btn-primary btn-sm">Save</button>
      </div>
    </div>
  </div>
  <!-- Copy a month theme (and its weeks) to other programs -->
  <div id="copyModal" class="modal" hidden>
    <div class="modal-card">
      <p id="copyFormTitle" class="form-heading">Copy theme</p>
      <p id="copyHint" class="copy-hint"></p>
      <div id="copyTargets"></div>
      <div class="form-actions">
        <span id="copyFormMsg" class="form-msg"></span>
        <button id="copyCancelBtn" class="btn-ghost">Cancel</button>
        <button id="copyGoBtn" class="btn-primary btn-sm">Copy</button>
      </div>
    </div>
  </div>

  <!-- Add / edit a time block in the daily rhythm -->
  <div id="blockModal" class="modal" hidden>
    <div class="modal-card">
      <p id="blockFormTitle" class="form-heading">Add block</p>
      <label class="field-label">Label</label>
      <input id="bLabel" type="text" placeholder="e.g. Circle Time" maxlength="200" />
      <div class="time-row">
        <div>
          <label class="field-label">Starts</label>
          <input id="bStart" type="time" />
        </div>
        <div>
          <label class="field-label">Ends (optional)</label>
          <input id="bEnd" type="time" />
        </div>
      </div>
      <label class="field-label">Fills with…</label>
      <select id="bSource">
        <option value="">Nothing — just the label</option>
        <option value="week_focus">Week focus</option>
        <option value="week_activities">Week activities</option>
        <option value="week_phonics">Week phonics</option>
        <option value="week_questions">Week questions</option>
        <option value="month_theme">Month theme</option>
        <option value="month_song">Song of the month</option>
        <option value="month_vocab">Month vocab</option>
        <option value="month_activities">Month activities</option>
        <option value="month_phonics">Month phonics</option>
      </select>
      <div class="form-actions">
        <span id="blockFormMsg" class="form-msg"></span>
        <button id="blockCancelBtn" class="btn-ghost">Cancel</button>
        <button id="blockSaveBtn" class="btn-primary btn-sm">Save</button>
      </div>
    </div>
  </div>

  <!-- One-off note on a block for the selected date -->
  <div id="noteModal" class="modal" hidden>
    <div class="modal-card">
      <p id="noteFormTitle" class="form-heading">Note</p>
      <textarea id="nText" rows="3" placeholder="e.g. bring shells for beach week"></textarea>
      <div class="form-actions">
        <span id="noteFormMsg" class="form-msg"></span>
        <button id="noteRemoveBtn" class="btn-ghost" hidden>Remove</button>
        <button id="noteCancelBtn" class="btn-ghost">Cancel</button>
        <button id="noteSaveBtn" class="btn-primary btn-sm">Save</button>
      </div>
    </div>
  </div>
</div>

<script src="/shared-auth.js"></script>
<script src="./curriculum.js"></script>
</body>
</html>
