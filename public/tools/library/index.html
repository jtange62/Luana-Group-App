<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#DDF3E6" />
<link rel="manifest" href="/manifest.json" />
<link rel="apple-touch-icon" href="/icons/icon-192.png" />
<title>Lesson library · Luana Group App</title>
<meta property="og:title" content="Luana Lesson Library" />
<meta property="og:description" content="Curriculum and lesson plans for the Luana English School team." />
<meta property="og:type" content="website" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="/shared.css" />
<link rel="stylesheet" href="./library.css" />
</head>
<body>
<div id="app">
  <header class="topbar">
    <div class="topbar-inner">
      <a class="back-btn" href="/" aria-label="Back" onclick="event.preventDefault();history.length>1?history.back():location.href='/'">‹</a>
      <a class="brand" href="/" title="Home">
        <img src="/icons/favicon-32.png" alt="" class="brand-mark" />
        <span class="brand-name">Luana Group App</span>
      </a>
      <button id="signOut" class="icon-btn" aria-label="Sign out" title="Sign out">⎋</button>
    </div>
    <p class="brand-tag">📚 Lesson library</p>
  </header>

  <nav id="programTabs" class="tabs" aria-label="Programs"></nav>

  <div class="lib-toolbar">
    <select id="monthFilter" class="month-select" aria-label="Filter by month"></select>
    <input id="search" class="search" type="search" placeholder="Search lessons, tags, files…" />
    <button id="addBtn" class="btn-primary btn-sm">＋ Add</button>
  </div>

  <section id="form" class="lesson-form" hidden>
    <p id="formTitle" class="form-heading">New lesson</p>
    <input id="fTitle" type="text" placeholder="Theme / lesson title — e.g. Spring &amp; Animals" maxlength="200" />
    <div class="form-row">
      <select id="fProgram" class="form-select"></select>
      <select id="fMonth" class="form-select"></select>
    </div>
    <textarea id="fNotes" rows="3" placeholder="Notes / description (optional)"></textarea>
    <input id="fLink" type="text" placeholder="Link — Google Doc, YouTube, etc. (optional)" />
    <input id="fTags" type="text" placeholder="Tags, comma separated — e.g. kinder, phonics" />
    <div id="fileRow" class="file-row">
      <label class="file-label">📎 Attach files
        <input id="fFiles" type="file" multiple hidden />
      </label>
      <span id="fileList" class="file-chosen"></span>
    </div>
<div class="form-actions">
      <span id="formMsg" class="form-msg"></span>
      <button id="cancelBtn" class="btn-ghost">Cancel</button>
      <button id="saveBtn" class="btn-primary btn-sm">Save</button>
    </div>
  </section>

  <main id="list" class="lesson-list" aria-live="polite"></main>
  <div id="empty" class="empty" hidden>
    <span class="empty-icon">📚</span>
    <p>No lessons yet — tap “＋ Add” to upload the first one.</p>
  </div>
  <div id="noMatch" class="empty" hidden>
    <span class="empty-icon">🔍</span>
    <p>Nothing matches that search.</p>
  </div>
  <div id="loading" class="loading">Loading…</div>
  <button id="loadMore" class="load-more" hidden>Load more lessons</button>

  <!-- Lesson detail -->
  <div id="detail" class="detail-overlay" hidden>
    <div class="detail-topbar">
      <button id="detailClose" class="back-btn" aria-label="Close">‹</button>
      <h2 id="detailTitle" class="detail-title"></h2>
    </div>
    <div id="detailBody" class="detail-body"></div>
  </div>

  <!-- Photo lightbox -->
  <div id="lightbox" class="lightbox" hidden>
    <button id="lbClose" class="lb-close" aria-label="Close">✕</button>
    <img id="lbImg" class="lb-img" src="" alt="Photo" />
    <button id="lbPrev" class="lb-nav lb-prev" aria-label="Previous">‹</button>
    <button id="lbNext" class="lb-nav lb-next" aria-label="Next">›</button>
    <div id="lbCounter" class="lb-counter"></div>
  </div>
</div>

<script src="/shared-auth.js"></script>
<script src="/shared-utils.js"></script>
<script src="./library.js"></script>
</body>
</html>
