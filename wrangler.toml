name = "luanagroupapp"
compatibility_date = "2024-09-23"
pages_build_output_dir = "public"

# D1 database binding. After you create the database (see SETUP.md),
# paste its database_id below.
[[d1_databases]]
binding = "DB"
database_name = "luana-board"
database_id = "a2008abc-ebf0-400c-929c-cf1af2cc515c"

# R2 bucket for lesson-library file uploads.
[[r2_buckets]]
binding = "FILES"
bucket_name = "luana-lessons"

# Secrets required for the Drive upload tool — set via wrangler CLI, not here:
#   npx wrangler secret put GOOGLE_SA_KEY     (paste the service account JSON)
#   npx wrangler secret put DRIVE_FOLDER_ID   (the folder ID from the Drive URL)
